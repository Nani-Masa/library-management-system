version: '3.9'

services:
  # ─────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: libraryos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-library_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-library_pass}
      POSTGRES_DB: ${DB_NAME:-libraryos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-library_user} -d ${DB_NAME:-libraryos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # Backend API
  # ─────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: libraryos_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-library_user}:${DB_PASSWORD:-library_pass}@db:5432/${DB_NAME:-libraryos}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      FRONTEND_URL: http://localhost:3000
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: libraryos_web
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:

networks:
  default:
    name: libraryos_network
